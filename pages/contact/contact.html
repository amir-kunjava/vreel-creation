    <script>
    //ABOUT TAB

var tabLinks = document.getElementsByClassName("tab-links");
var tabContents = document.getElementsByClassName("tab-contents");
function opentab(tabname){
for(tabLink of tabLinks){
tabLink.classList.remove("active-link");
}
for(tabContent of tabContents){
tabContent.classList.remove("active-tab");
}
event.currentTarget.classList.add("active-link");
document.getElementById(tabname).classList.add("active-tab");
}

//CONTACT FORM

const form = document.getElementById("contactForm");
const contact = document.getElementById("contact");
const error = document.getElementById("contactError");

contact.addEventListener("input", () => {
  const value = contact.value.trim();

  const isPhone = /^[0-9]{10}$/.test(value);
  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);

  if (value === "") {
    error.textContent = "";
    contact.setCustomValidity("");
  } else if (!isPhone && !isEmail) {
    error.textContent =
      "Enter a valid 10-digit phone number or email address.";
    contact.setCustomValidity("Invalid");
  } else {
    error.textContent = "";
    contact.setCustomValidity("");
  }
});

form.addEventListener("submit", (e) => {
  const value = contact.value.trim();

  const isPhone = /^[0-9]{10}$/.test(value);
  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);

  if (!isPhone && !isEmail) {
    e.preventDefault();
  }
});

//FORM AUTOMATION

const form = document.getElementById("contactForm");

if (form) {
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.querySelector('[name="name"]').value.trim();
    const contact = document.querySelector('[name="contact"]').value.trim();
    const requirement = document.querySelector('[name="requirement"]').value.trim();

    const message = `📩 New Contact Request

👤 Name: ${name}

📞 Contact: ${contact}

📝 Requirement:
${requirement}`;

    const BOT_TOKEN = "7775872728:AAFGGJnAlRxLDFjuPDwjWCZeYHYLy6ltlbc";
    const CHAT_ID = "228485916";

    try {
      const response = await fetch(
        `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
          }),
        }
      );

      const data = await response.json();

      if (data.ok) {
        alert("Message sent successfully!");
        form.reset();
      } else {
        alert("Telegram Error: " + data.description);
      }
    } catch (error) {
      console.error(error);
      alert("Failed to send message.");
    }
  });
}
